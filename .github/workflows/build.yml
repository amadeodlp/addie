name: Build

on:
  push:
    tags:
      - 'v*'

jobs:

  # ─── macOS — DMG ────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pyinstaller sentence-transformers numpy

      - name: Build RAG executable (macOS)
        run: |
          cd scripts
          pyinstaller query_index.spec --distpath ../build-bin-tmp
          cd ..
          mkdir -p build-bin
          mv build-bin-tmp/query_index build-bin/query_index

      - name: Install Node dependencies
        run: npm ci

      - name: Build DMG
        run: npm run build:mac -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Ad-hoc sign app bundle
        run: |
          APP=$(find dist -name "*.app" | head -1)
          codesign --deep --force --sign - "$APP"
          echo "Signed: $APP"

      - name: Rename DMG
        run: mv dist/Addie.dmg dist/Addie.dmg 2>/dev/null || mv dist/*.dmg dist/Addie.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: addie-mac
          path: dist/Addie.dmg

  # ─── Windows — build unsigned EXE ───────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pyinstaller sentence-transformers numpy

      - name: Build RAG executable (Windows)
        run: |
          cd scripts
          pyinstaller query_index.spec --distpath ..\build-bin-tmp
          cd ..
          mkdir build-bin
          move build-bin-tmp\query_index.exe build-bin\query_index.exe
        shell: cmd

      - name: Install Node dependencies
        run: npm ci

      - name: Build EXE installer (unsigned)
        run: npm run build:win -- --publish never

      - name: Rename EXE
        run: rename dist\*.exe Addie.Setup.exe
        shell: cmd

      - name: Upload unsigned EXE
        uses: actions/upload-artifact@v4
        with:
          name: addie-win-unsigned
          path: dist/Addie.Setup.exe

  # ─── Windows — sign with SignPath (FOSS program) ────────────────────────────
  sign-win:
    needs: build-win
    runs-on: ubuntu-latest
    steps:
      - name: Download unsigned EXE
        uses: actions/download-artifact@v4
        with:
          name: addie-win-unsigned
          path: unsigned

      - name: Sign with SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token:            ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id:      ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug:         addie
          signing-policy-slug:  release-signing
          artifact-configuration-slug: installer
          github-artifact-id:   ${{ steps.upload.outputs.artifact-id }}
          wait-for-completion:  true
          output-artifact-directory: signed

      - name: Upload signed EXE
        uses: actions/upload-artifact@v4
        with:
          name: addie-win
          path: signed/Addie.Setup.exe

  # ─── GitHub Release — attach both artifacts ─────────────────────────────────
  release:
    needs: [build-mac, sign-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: addie-mac
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: addie-win
          path: release-assets

      - name: Attach installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
